<div class="login-container">
  <div class="login-wrapper">
    <!-- Lado izquierdo - Imagen -->
    <div class="login-image-section">
      <img src="images/ropa 8.avif" alt="Fashion Girls Store" class="main-image">
    </div>

    <!-- Lado derecho - Formulario -->
    <div class="login-form-section">
      <div class="form-container">
        <div class="login-header">
          <h2>Iniciar Sesión</h2>
          <p>Accede a tu panel de administración</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
          <!-- Campo Usuario -->
          <div class="form-group">
            <label for="email">Usuario:</label>
            <input 
              type="text" 
              id="email" 
              formControlName="email"
              class="form-control"
              [class.error]="email?.invalid && (email?.dirty || email?.touched || isSubmitted)"
              placeholder="Ingresa tu usuario">
            
            <!-- Mensajes de error para email -->
            <div class="error-messages" *ngIf="email?.invalid && (email?.dirty || email?.touched || isSubmitted)">
              <small *ngIf="email?.errors?.['required']" class="error-text">
                El usuario es obligatorio
              </small>
            </div>
          </div>

          <!-- Campo Contraseña -->
          <div class="form-group">
            <label for="password">Contraseña:</label>
            <input 
              type="password" 
              id="password" 
              formControlName="password"
              class="form-control"
              [class.error]="password?.invalid && (password?.dirty || password?.touched || isSubmitted)"
              placeholder="Ingresa tu contraseña">
            
            <!-- Mensajes de error para password -->
            <div class="error-messages" *ngIf="password?.invalid && (password?.dirty || password?.touched || isSubmitted)">
              <small *ngIf="password?.errors?.['required']" class="error-text">
                La contraseña es obligatoria
              </small>
              <small *ngIf="password?.errors?.['minlength']" class="error-text">
                La contraseña debe tener al menos 6 caracteres
              </small>
            </div>
          </div>

          <!-- Mensaje de error general -->
          <div class="general-error" *ngIf="errorMessage">
            <p class="error-text">{{ errorMessage }}</p>
          </div>

          <!-- Botón de envío -->
          <button type="submit" class="login-btn">
            Iniciar Sesión
          </button>
        </form>

        <div class="login-footer">
          <div class="credentials-hint">
            <p><strong>Credenciales de prueba:</strong></p>
            <p>Usuario: <code>admin</code></p>
            <p>Contraseña: <code>mariory123</code></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
